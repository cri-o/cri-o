# Local registry mirror for CI integration tests
# Installed by the integration workflow to redirect image pulls
# through the local registry populated by setup-local-registry.sh.
# Mirrors with fallback - tries localhost:5000 first, falls back to the
# original registry if the image is not found in the mirror.

[[registry]]
location = "registry.k8s.io"
  [[registry.mirror]]
  location = "localhost:5000"
  insecure = true

[[registry]]
location = "gcr.io"
  [[registry.mirror]]
  location = "localhost:5000"
  insecure = true

[[registry]]
location = "k8s.gcr.io"
  [[registry.mirror]]
  location = "localhost:5000"
  insecure = true

[[registry]]
location = "quay.io"
  [[registry.mirror]]
  location = "localhost:5000"
  insecure = true

[[registry]]
location = "registry.access.redhat.com"
  [[registry.mirror]]
  location = "localhost:5000"
  insecure = true
